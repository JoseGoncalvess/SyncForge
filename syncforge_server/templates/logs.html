<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SyncForge - Histórico de Logs</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
    if (
      localStorage.getItem('theme') === 'dark' ||
      (!('theme' in localStorage) &&
        window.matchMedia('(prefers-color-scheme: dark)').matches)
    ) {
      document.documentElement.classList.add('dark')
    } else {
      document.documentElement.classList.remove('dark')
    }
  </script>
</head>

<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 pb-10 transition-colors duration-300">
  <div class="container mx-auto mt-10 max-w-6xl px-4">
    <div
      class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow-md mb-8 border-t-4 border-orange-500 flex flex-col md:flex-row justify-between items-center gap-4">
      <h1 class="text-2xl font-bold flex items-center gap-2">
        📜 Histórico de Sincronização
      </h1>
      <nav
        class="flex items-center gap-2 bg-gray-100 dark:bg-gray-700 p-1 rounded-lg border border-gray-200 dark:border-gray-600">
        <a href="/"
          class="px-4 py-2 text-sm font-semibold text-gray-600 dark:text-gray-300 hover:text-blue-600 rounded">📦
          Cofres</a>
        <a href="/web/users"
          class="px-4 py-2 text-sm font-semibold text-gray-600 dark:text-gray-300 hover:text-purple-600 rounded">👥
          Usuários</a>
        <span
          class="px-4 py-2 text-sm font-bold text-orange-700 dark:text-orange-400 bg-white dark:bg-gray-800 shadow-sm rounded">📜
          Logs</span>
        <div class="w-px h-6 bg-gray-300 dark:bg-gray-500 mx-1"></div>
        <a href="/logout"
          class="px-4 py-2 text-sm font-bold text-red-500 hover:bg-red-50 dark:hover:bg-gray-800 rounded">Sair 🚪</a>
      </nav>
    </div>

    <form method="get" action="/web/logs"
      class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow-sm mb-6 grid grid-cols-1 md:grid-cols-4 gap-4 items-end border border-gray-200 dark:border-gray-700">
      <div>
        <label class="block text-[10px] uppercase font-black text-gray-400 mb-2">Filtrar por Usuário</label>
        <select name="user_id"
          class="w-full bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg p-2.5 text-sm outline-none focus:ring-2 focus:ring-orange-500">
          <option value="">Todos os Usuários</option>
          {% for u in usuarios %}
          <option value="{{ u.id }}" {% if filters.user_id=="u.id" %}selected{% endif %}>
            {{ u.username }}
          </option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label class="block text-[10px] uppercase font-black text-gray-400 mb-2">Data Início</label>
        <input type="date" name="start_date" value="{{ filters.start or '' }}"
          class="w-full bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg p-2.5 text-sm outline-none" />
      </div>
      <div>
        <label class="block text-[10px] uppercase font-black text-gray-400 mb-2">Data Fim</label>
        <input type="date" name="end_date" value="{{ filters.end or '' }}"
          class="w-full bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg p-2.5 text-sm outline-none" />
      </div>
      <button type="submit"
        class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-2.5 rounded-lg shadow-md active:scale-95 transition-all">
        Filtrar 🔍
      </button>
    </form>

    <div
      class="bg-white dark:bg-gray-800 rounded-xl shadow-lg overflow-hidden border border-gray-200 dark:border-gray-700">
      <table class="min-w-full">
        <thead class="bg-gray-50 dark:bg-gray-700/50 text-[10px] uppercase text-gray-500">
          <tr>
            <th class="py-4 px-6 text-left">Data / Hora</th>
            <th class="py-4 px-6 text-left">Usuário</th>
            <th class="py-4 px-6 text-left">Ação</th>
            <th class="py-4 px-6 text-left">Arquivo</th>
          </tr>
        </thead>
        <tbody class="text-sm divide-y divide-gray-100 dark:divide-gray-700">
          {% for log in logs %}
          <tr class="hover:bg-orange-50/20 dark:hover:bg-orange-900/10 transition-colors">
            <td class="py-4 px-6 text-gray-500 font-mono text-xs">
              {{ log.timestamp }}
            </td>
            <td class="py-4 px-6 font-bold">{{ log.username }}</td>
            <td class="py-4 px-6">
              <span
                class="px-2 py-1 rounded text-[10px] font-black border {% if log.action == 'DELETE' %} bg-red-100 text-red-700 border-red-200 {% elif log.action == 'RENAME' %} bg-purple-100 text-purple-700 border-purple-200 {% elif log.action in ['UPLOAD', 'CREATE'] %} bg-green-100 text-green-700 border-green-200 {% else %} bg-blue-100 text-blue-700 border-blue-200 {% endif %}">
                {{ log.action }}
              </span>
            </td>
            <td class="py-4 px-6 truncate max-w-xs font-medium">
              {{ log.file_name }}
            </td>
          </tr>
          {% else %}
          <tr>
            <td colspan="4" class="py-20 text-center text-gray-400 italic">
              Nenhum registro encontrado.
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</body>

</html>
